<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Modifier un film</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h1 class="mb-4">✏️ Modifier le film</h1>

    <div class="card bg-secondary p-4 shadow">

        <form method="POST">

            <!-- TITRE -->
            <div class="mb-3">
                <label class="form-label">Titre</label>
                <input type="text" name="title" class="form-control" value="{{ film.title }}" required>
            </div>

            <!-- IMAGE -->
            <div class="mb-3">
                <label class="form-label">Image (affiche)</label>
                <input type="text" name="image" class="form-control" value="{{ film.image }}">
            </div>

            <!-- IMAGE COUVERTURE -->
            <div class="mb-3">
                <label class="form-label">Image couverture</label>
                <input type="text" name="image_couv" class="form-control" value="{{ film.image_couv }}">
            </div>

            <!-- GENRES -->
            <div class="mb-3">
                <label class="form-label">Genres (séparés par virgule)</label>
                <input type="text" name="genres" class="form-control"
                       value="{{ film.genres | join(', ') }}">
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="2">{{ film.description }}</textarea>
            </div>

            <!-- SYNOPSIS -->
            <div class="mb-3">
                <label class="form-label">Synopsis</label>
                <textarea name="synopsis" class="form-control" rows="4">{{ film.synopsis }}</textarea>
            </div>

            <!-- DATE -->
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="text" name="date" class="form-control" value="{{ film.date }}">
            </div>

            <!-- DURÉE -->
            <div class="mb-3">
                <label class="form-label">Durée</label>
                <input type="text" name="duree" class="form-control" value="{{ film.duree }}">
            </div>

            <!-- TRAILER -->
            <div class="mb-3">
                <label class="form-label">Lien du trailer</label>
                <input type="text" name="trailer" class="form-control" value="{{ film.trailer }}">
            </div>

            <!-- BOUTONS -->
            <div class="d-flex justify-content-between">

                <a href="{{ url_for('admin_page') }}" class="btn btn-light">
                    ⬅ Retour
                </a>

                <button type="submit" class="btn btn-success">
                    💾 Enregistrer
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
