<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Films - Ciné Note</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='films.css') }}">
</head>
<body id="body">

<!-- NAVBAR IDENTIQUE À INDEX -->
<nav class="navbar navbar-expand-lg transparent-navbar fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('index') }}">Ciné Note 🎬</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto nav-bubble">
        <li class="nav-item"><a class="nav-link bubble" href="{{ url_for('index') }}">Home</a></li>
        <li class="nav-item"><a class="nav-link bubble" href="{{ url_for('films_page') }}">Films</a></li>
        <li class="nav-item"><a class="nav-link bubble" href="{{ url_for('favoris') }}">Favoris</a></li>
        <li class="nav-item"><a class="nav-link bubble" href="{{ url_for('note') }}">Note</a></li>
        {% if 'user' in session %}
        <li class="nav-item"><a class="nav-link bubble btn btn-primary text-white" href="{{ url_for('logout') }}">Se déconnecter</a></li>
        {% else %}
        <li class="nav-item"><a class="nav-link bubble btn btn-primary text-white" href="{{ url_for('se_connecter') }}">Se connecter</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<div style="height:65px;"></div>

<!-- CONTENU DE LA PAGE FILMS -->
<div class="container mt-4">
    <h2 class="page-title mb-3">Tous les Films</h2>
    <div class="row">
        {% for film in films %}
        <div class="col-md-3 mb-4">
            <div class="card h-100">
                <a href="{{ film.url }}">
                    <img src="{{ url_for('static', filename='images/' + film.image) }}" class="card-img-top" alt="{{ film.title }}">
                </a>
                <div class="card-body d-flex flex-column justify-content-between" style="height: 130px;">
                    <div>
                        <h6 class="card-title">{{ film.title }}</h6>
                        {% if film.genres %}
                        <p class="card-genres">{{ film.genres|join(' • ') }}</p>
                        {% endif %}
                    </div>
                    <button class="carousel-btn mt-2" onclick="window.location.href='{{ film.url }}'">Voir</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
